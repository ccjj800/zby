name: 酒店源
on:
  schedule:
    - cron: 0 */6 * * *
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: 安装依赖
      run: pip install requests eventlet

    - name: 运行所有酒店源脚本（输出到根目录）
      run: |
        cd "${{ github.workspace }}/py/iptv源收集检测/主频道/专享频道/py/酒店源"
        
        # 依次运行 3 个脚本，全部输出到 jiudianyuan.txt
        python iptv.py
        python iptv2.py
        python gxtv.py

    - name: 自动去重 + 清理空行
      run: |
        cd ${{ github.workspace }}
        # 去重
        sort -u jiudianyuan.txt -o jiudianyuan.txt
        # 清理空行
        sed -i '/^$/d' jiudianyuan.txt

    - name: 提交更新
      run: |
        cd ${{ github.workspace }}
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add jiudianyuan.txt
        git commit -m "✅ 酒店源自动更新"
        git push
