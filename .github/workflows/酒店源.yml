name: 酒店源
on:
  schedule:
    - cron: 0 */6 * * *
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 拉取最新
      run: git pull origin main

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.11

    - name: 安装依赖
      run: pip install requests

    - name: 运行脚本
      run: |
        cd "${{ github.workspace }}/py/iptv源收集检测/主频道/专享频道/py/酒店源"
        
        python iptv.py
        python iptv2.py
        python gxtv.py

    - name: 去重 + 清理
      run: |
        cd "${{ github.workspace }}"
        sort -u jiudianyuan.txt -o jiudianyuan.txt
        sed -i '/^$/d' jiudianyuan.txt

    - name: 提交更新
      run: |
        cd "${{ github.workspace }}"
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add jiudianyuan.txt
        git commit -m "✅ 酒店源自动更新"
        git push
