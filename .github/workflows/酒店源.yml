name: 酒店源
on:
  schedule:
    - cron: 0 */6 * * *
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: 3.x

    - name: Install dependencies
      run: pip install selenium requests futures eventlet

    - name: 运行脚本并指定输出地址
      run: |
        cd "${{ github.workspace }}/py/iptv源收集检测/主频道/专享频道/py/酒店源"
        
        # 运行并强制输出到 仓库根目录 / jiudianyuan.txt（你要的最终文件）
        python iptv.py > ${{ github.workspace }}/jiudianyuan.txt
        python iptv2.py >> ${{ github.workspace }}/jiudianyuan.txt
        
        # 重点：gxtv.txt 直接输出到根目录
        python gxtv.py > ${{ github.workspace }}/gxtv.txt

    - name: 提交更新
      run: |
        cd $GITHUB_WORKSPACE
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add .
        git commit -m "更新酒店源到根目录"
        git push
